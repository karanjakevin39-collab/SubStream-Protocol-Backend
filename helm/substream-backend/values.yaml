# Default values for substream-backend.
# This is a YAML-formatted file.

replicaCount: 3

image:
  repository: substream/backend
  pullPolicy: Always
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

namespace: substream

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: substream.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 50
  targetCPUUtilizationPercentage: 70
  scaleDownStabilizationSeconds: 300
  scaleUpPercent: 100
  scaleUpPeriodSeconds: 15
  scaleUpPods: 4

worker:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    redisQueueThreshold: 1000
    scaleDownStabilizationSeconds: 600
    scaleUpPercent: 200
    scaleUpPeriodSeconds: 15
    scaleUpPods: 5

redis:
  host: "redis-service"
  port: 6379
  existingSecret: ""
  existingPasswordKey: "redis-password"

database:
  filename: "/app/data/substream.db"
  maxConnections: 20

# Migration configuration
migration:
  enabled: true
  strategy: "initContainer" # Options: "initContainer" or "job"
  timeout: 1800 # 30 minutes in seconds
  lockTimeout: 300 # 5 minutes in seconds
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  # Vault configuration for migration credentials
  vault:
    enabled: false
    role: "substream-migration"
    secretPath: "database/creds/migration"
    address: "http://vault:8200"

persistence:
  enabled: true
  storageClass: "fast-ssd"
  size: 10Gi

nodeSelector: {}

tolerations: []

affinity: {}

# External metrics configuration
metrics:
  redis:
    enabled: true
    image: "redis:7-alpine"
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"

# Prometheus monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s
  prometheusRule:
    enabled: true

# Environment variables
env:
  NODE_ENV: "production"
  PORT: "3000"

# Additional volumes
volumes: []
# - name: extra-volume
#   emptyDir: {}

# Additional volume mounts
volumeMounts: []
# - name: extra-volume
#   mountPath: /extra/path

# Health check configuration
livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

workerLivenessProbe:
  exec:
    command:
    - node
    - worker.js
    - --soroban
    - --health
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

workerReadinessProbe:
  exec:
    command:
    - node
    - worker.js
    - --soroban
    - --health
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
