{{- if and .Values.migration.enabled (eq .Values.migration.strategy "job") }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "substream-backend.fullname" . }}-migration
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "substream-backend.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: {{ .Values.migration.timeout }}
  template:
    metadata:
      labels:
        {{- include "substream-backend.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "substream-backend.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migration
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - node
            - scripts/migrate-init-container.js
          env:
            - name: NODE_ENV
              value: {{ .Values.env.NODE_ENV }}
            - name: DATABASE_FILENAME
              value: {{ .Values.database.filename }}
            - name: POD_NAME
              value: {{ include "substream-backend.fullname" . }}-migration
            - name: NAMESPACE
              value: {{ .Values.namespace }}
            - name: HOSTNAME
              value: migration-job
            - name: MIGRATION_TIMEOUT
              value: {{ .Values.migration.timeout | quote }}
            - name: MIGRATION_LOCK_TIMEOUT
              value: {{ .Values.migration.lockTimeout | quote }}
            {{- if .Values.redis.existingSecret }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret }}
                  key: {{ .Values.redis.existingPasswordKey }}
            {{- end }}
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
          volumeMounts:
            - name: data-volume
              mountPath: /app/data
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: data-volume
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "substream-backend.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp-volume
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
