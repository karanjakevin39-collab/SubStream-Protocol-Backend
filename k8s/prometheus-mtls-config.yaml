# Prometheus mTLS Configuration for Metrics Scraping
# Configures Prometheus to authenticate through the Istio mTLS mesh

---
# Prometheus ServiceAccount with Istio service account annotation
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
  annotations:
    # Enable Istio sidecar injection for Prometheus
    sidecar.istio.io/inject: "true"
---
# Prometheus ConfigMap with mTLS-aware scraping configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'substream-production'
        monitor: 'prometheus'

    # TLS configuration for scraping
    tls_config:
      insecure_skip_verify: false
      min_version: TLSv1.2

    scrape_configs:
      # Scrape backend metrics with mTLS
      - job_name: 'substream-backend'
        kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
            - substream
        scheme: https
        tls_config:
          ca_file: /etc/prometheus/certs/ca.crt
          cert_file: /etc/prometheus/certs/client.crt
          key_file: /etc/prometheus/certs/client.key
          insecure_skip_verify: false
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app]
          action: keep
          regex: substream-backend
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
        - source_labels: [__meta_kubernetes_pod_node_name]
          target_label: node
        - source_labels: [__address__]
          target_label: __param_target
        - target_label: __param_module
          replacement: http
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - replacement: /metrics
          target_label: __metrics_path__

      # Scrape worker metrics with mTLS
      - job_name: 'substream-worker'
        kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
            - substream
        scheme: https
        tls_config:
          ca_file: /etc/prometheus/certs/ca.crt
          cert_file: /etc/prometheus/certs/client.crt
          key_file: /etc/prometheus/certs/client.key
          insecure_skip_verify: false
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app]
          action: keep
          regex: substream-worker
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
        - source_labels: [__meta_kubernetes_pod_node_name]
          target_label: node
        - source_labels: [__address__]
          target_label: __param_target
        - target_label: __param_module
          replacement: http
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - replacement: /metrics
          target_label: __metrics_path__

      # Scrape Soroban Indexer metrics with mTLS
      - job_name: 'soroban-indexer'
        kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
            - substream
        scheme: https
        tls_config:
          ca_file: /etc/prometheus/certs/ca.crt
          cert_file: /etc/prometheus/certs/client.crt
          key_file: /etc/prometheus/certs/client.key
          insecure_skip_verify: false
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app]
          action: keep
          regex: soroban-indexer
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
        - source_labels: [__meta_kubernetes_pod_node_name]
          target_label: node
        - source_labels: [__address__]
          target_label: __param_target
        - target_label: __param_module
          replacement: http
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - replacement: /metrics
          target_label: __metrics_path__

      # Scrape Istio mesh metrics
      - job_name: 'istio-mesh'
        kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
            - istio-system
        scheme: http
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app]
          action: keep
          regex: istiod
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
        - replacement: /metrics
          target_label: __metrics_path__

      # Scrape Istio envoy stats
      - job_name: 'istio-envoy'
        kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
            - substream
        scheme: http
        path: /stats/prometheus
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          action: replace
          target_label: pod
---
# Secret for Prometheus client certificates
apiVersion: v1
kind: Secret
metadata:
  name: prometheus-certs
  namespace: monitoring
type: kubernetes.io/tls
data:
  # Prometheus client certificate (base64 encoded)
  tls.crt: <BASE64_ENCODED_PROMETHEUS_CLIENT_CERT>
  # Prometheus client private key (base64 encoded)
  tls.key: <BASE64_ENCODED_PROMETHEUS_CLIENT_KEY>
  # Istio CA certificate (base64 encoded)
  ca.crt: <BASE64_ENCODED_ISTIO_CA_CERT>
---
# Prometheus Deployment with certificate volume mounts
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
      annotations:
        # Enable Istio sidecar injection
        sidecar.istio.io/inject: "true"
        # Configure Istio to not intercept Prometheus scraping
        traffic.sidecar.istio.io/includeInboundPorts: ""
    spec:
      serviceAccountName: prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:v2.45.0
        args:
        - '--config.file=/etc/prometheus/prometheus.yml'
        - '--storage.tsdb.path=/prometheus'
        - '--web.console.libraries=/usr/share/prometheus/console_libraries'
        - '--web.console.templates=/usr/share/prometheus/consoles'
        - '--web.enable-lifecycle'
        ports:
        - containerPort: 9090
          name: web
          protocol: TCP
        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus
        - name: prometheus-certs
          mountPath: /etc/prometheus/certs
          readOnly: true
        - name: prometheus-data
          mountPath: /prometheus
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: prometheus-config
        configMap:
          name: prometheus-config
      - name: prometheus-certs
        secret:
          secretName: prometheus-certs
          defaultMode: 0400
      - name: prometheus-data
        emptyDir: {}
---
# Prometheus Service
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  ports:
  - port: 9090
    targetPort: 9090
    name: web
  selector:
    app: prometheus
---
# ServiceMonitor for Prometheus Operator (if using Prometheus Operator)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: substream-backend
  namespace: substream
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: substream-backend
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scheme: https
    tlsConfig:
      caFile: /etc/prometheus/secrets/istio-ca/ca.crt
      certFile: /etc/prometheus/secrets/prometheus-client/tls.crt
      keyFile: /etc/prometheus/secrets/prometheus-client/tls.key
      insecureSkipVerify: false
---
# ServiceMonitor for worker
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: substream-worker
  namespace: substream
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: substream-worker
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scheme: https
    tlsConfig:
      caFile: /etc/prometheus/secrets/istio-ca/ca.crt
      certFile: /etc/prometheus/secrets/prometheus-client/tls.crt
      keyFile: /etc/prometheus/secrets/prometheus-client/tls.key
      insecureSkipVerify: false
---
# ServiceMonitor for Soroban Indexer
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: soroban-indexer
  namespace: substream
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: soroban-indexer
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scheme: https
    tlsConfig:
      caFile: /etc/prometheus/secrets/istio-ca/ca.crt
      certFile: /etc/prometheus/secrets/prometheus-client/tls.crt
      keyFile: /etc/prometheus/secrets/prometheus-client/tls.key
      insecureSkipVerify: false
