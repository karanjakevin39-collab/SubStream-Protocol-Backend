apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: substream-backend-monitor
  namespace: substream
  labels:
    app: substream-backend
spec:
  selector:
    matchLabels:
      app: substream-backend
  endpoints:
  - port: http
    interval: 30s
    path: /metrics
    scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: substream-backend-alerts
  namespace: substream
  labels:
    app: substream-backend
spec:
  groups:
  - name: substream.backend.alerts
    rules:
    - alert: High5xxErrorRate
      expr: rate(http_requests_total{status_code=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.02
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "High 5xx error rate detected"
        description: "5xx error rate is {{ $value | humanizePercentage }} for the last 5 minutes"
        runbook_url: "https://github.com/lifewithbigdamz/SubStream-Protocol-Backend/blob/main/docs/HPA_DEVOPS_RUNBOOK.md"
    - alert: SorobanIndexerLagHigh
      expr: soroban_indexer_ledger_lag > 50
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Soroban indexer is behind"
        description: "Indexer is {{ $value }} ledgers behind the Stellar network"
    - alert: DatabaseConnectionsHigh
      expr: database_connections_active > 50
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High database connection count"
        description: "Active database connections: {{ $value }}"
    - alert: APILatencyHigh
      expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 5
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "API latency is high"
        description: "95th percentile latency is {{ $value }}s"