# DEPRECATED: This file is deprecated. Secrets are now managed by HashiCorp Vault.
# 
# The Vault integration uses the Kubernetes authenticating sidecar injector
# to dynamically inject secrets into pods at runtime. Secrets are retrieved
# from Vault using the pod's Kubernetes Service Account token.
#
# Vault paths:
# - Static secrets: secret/data/substream
# - Dynamic database credentials: database/creds/substream-role
#
# To provision secrets in Vault, refer to VAULT_SETUP.md in the docs directory.
#
# This file is retained for backward compatibility during migration.
# After migration is complete, this file should be deleted.
