apiVersion: apps/v1
kind: Deployment
metadata:
  name: substream-worker
  namespace: substream
  labels:
    app: substream-worker
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: substream-worker
  template:
    metadata:
      labels:
        app: substream-worker
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
        # Vault sidecar injector annotations
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-inject-status: "update"
        vault.hashicorp.com/role: "substream-backend"
        vault.hashicorp.com/agent-pre-populate-only: "false"
        vault.hashicorp.com/agent-cache-use-auto-auth-token: "force"
        # Inject secrets as environment variables
        vault.hashicorp.com/secret-volumes: |
          - secretName: "substream-secrets"
            mountPath: "/vault/secrets"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
      - name: substream-worker
        image: substream/backend:latest
        imagePullPolicy: Always
        command: ["node", "worker.js", "--soroban"]
        ports:
        - containerPort: 3001
          name: metrics
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"
        # Vault configuration
        - name: VAULT_ENABLED
          value: "true"
        - name: VAULT_ADDR
          value: "http://vault:8200"
        - name: VAULT_ROLE
          value: "substream-backend"
        - name: VAULT_AUTH_PATH
          value: "auth/kubernetes"
        - name: VAULT_SECRET_PATH
          value: "secret/data/substream"
        - name: VAULT_DB_PATH
          value: "database/creds/substream-role"
        # Soroban configuration from ConfigMap
        - name: SOROBAN_RPC_URL
          valueFrom:
            configMapKeyRef:
              name: substream-config
              key: soroban-rpc-url
        - name: SOROBAN_NETWORK_PASSPHRASE
          valueFrom:
            configMapKeyRef:
              name: substream-config
              key: soroban-network-passphrase
        - name: SOROBAN_CONTRACT_ID
          valueFrom:
            configMapKeyRef:
              name: substream-config
              key: soroban-contract-id
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command:
            - node
            - worker.js
            - --soroban
            - --health
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - node
            - worker.js
            - --soroban
            - --health
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
      volumes:
      - name: tmp-volume
        emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      schedulerName: default-scheduler
---
apiVersion: v1
kind: Service
metadata:
  name: substream-worker-service
  namespace: substream
  labels:
    app: substream-worker
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: metrics
  selector:
    app: substream-worker
